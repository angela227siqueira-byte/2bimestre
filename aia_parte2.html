<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Parte 2 - Métodos de AIA (páginas 1 a 4)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
        }

        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .fixed-header {
            margin-bottom: 12px;
            border-bottom: 2px solid #dde5e0;
            padding-bottom: 8px;
        }
        .fixed-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f3d2e;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a5e44;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: #dee6e1;
            height: 7px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #1a7a58;
            height: 7px;
            width: 0%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.5;
            margin: 0 2px;
            scroll-behavior: smooth;
        }
        .text-content p { margin-bottom: 1em; }
        .text-content h2, .text-content h3, .text-content h4 {
            margin: 1.2em 0 0.3em;
            color: #154e3a;
            font-weight: 600;
        }
        .text-content h2 { border-left: 5px solid #1a7a58; padding-left: 15px; }

        /* Estilo para imagens (padrão harmonizado) */
        .img-text-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .img-container {
            flex: 0 0 auto;
            max-width: 35vw;
            text-align: center;
        }
        .img-container img {
            width: 100%;
            height: 50vh;
            max-height: 400px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .text-container {
            flex: 1;
            min-width: 200px;
        }
        .right-image .text-container { order: 1; }
        .right-image .img-container { order: 2; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: inherit;
        }
        th, td {
            border: 1px solid #b3cdbf;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #ecf3ef;
            font-weight: 600;
        }

        .toolbar-single {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            padding: 4px 0 8px;
            border-top: 1px solid #dde5e0;
            border-bottom: 1px solid #dde5e0;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 10px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; border-color: #b6ccc1; pointer-events: none; }
        select.tool-btn { background: #ecf3ef; width: auto; }

        @media (max-width: 700px) {
            .reader-wrapper { max-width: 98%; padding: 15px; }
            .tool-btn { padding: 8px 10px; min-width: 50px; font-size: 0.9rem; }
            .img-text-row { flex-direction: column; }
            .img-container { max-width: 100%; }
            .img-container img { height: auto; max-height: 300px; }
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div id="readerScreen" class="screen active">
        <div class="fixed-header">
            <h1>Métodos de Avaliação de Impactos Ambientais</h1>
            <div class="progress-row">
                <span id="pageXofY">Página 1 de 4</span>
                <span id="progressPercent">25%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 25%"></div>
            </div>
        </div>
        <div class="text-content" id="pageContent"></div>
        <div class="toolbar-single">
            <button class="tool-btn" id="fontMinusBtn" title="Diminuir fonte">A−</button>
            <button class="tool-btn" id="fontPlusBtn" title="Aumentar fonte">A+</button>
            <button class="tool-btn" id="fullscreenBtn" title="Tela cheia">⛶</button>
            <button class="tool-btn" id="prevBtnInline" title="Página anterior">◀</button>
            <button class="tool-btn" id="nextBtnInline" title="Próxima página">▶</button>
            <button class="tool-btn" id="speakBtn" title="Ouvir/Parar">🔊</button>
            <select id="rateSelect" class="tool-btn" style="width: auto;">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- Conteúdo das 4 páginas (com figuras) -----
        const pages = [
            // PÁGINA 1 - Metáfora do bolo + figura
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h2>1.1 A metáfora da receita de bolo</h2>
                    <p>Assim como preparar um bolo exige três fases bem definidas, a Avaliação de Impacto Ambiental (AIA) também se organiza em etapas que, se negligenciadas, comprometem todo o resultado. O técnico em meio ambiente deve conhecer cada uma dessas fases para não “errar a receita”.</p>
                    <h3>Planejamento (preparação)</h3>
                    <p>É o momento de definir o escopo do estudo, escolher o método de AIA, coletar dados de base (diagnóstico ambiental) e identificar a legislação aplicável (resoluções CONAMA, leis estaduais, normas técnicas). Também se elabora o Termo de Referência (TR), que orienta toda a execução. Sem um bom planejamento, o estudo pode focar nos parâmetros errados ou esquecer requisitos legais.</p>
                    <h3>Execução (o processo)</h3>
                    <p>Consiste em aplicar o método escolhido: coletar amostras em campo, analisar em laboratório, realizar as simulações (se for o caso) e calcular a magnitude (diferença entre o valor final e o valor inicial) e a importância (peso do impacto). Erros de coleta ou análise invalidam as conclusões, assim como pular uma etapa da receita estraga o bolo.</p>
                    <h3>Conclusão (avaliação do resultado)</h3>
                    <p>Nesta fase elabora‑se o relatório técnico (EIA) e a sua versão em linguagem acessível (RIMA), propõem‑se medidas mitigadoras e define‑se um plano de monitoramento. A falta de medidas concretas torna o estudo meramente acadêmico inútil para a tomada de decisão. Uma boa conclusão é comparável ao bolo pronto, bonito e saboroso.</p>
                    <table>
                        <caption style="caption-side: top; text-align: left; font-weight: bold; margin-bottom: 8px;">Consequências de desvios em cada fase</caption>
                        <thead><tr><th>Fase do bolo</th><th>Fase da AIA</th><th>Consequência do desvio</th></tr></thead>
                        <tbody>
                            <tr><td>Planejamento (escolher receita, separar ingredientes)</td><td>Planejamento</td><td>Estudo focado nos parâmetros errados ou omissão legal</td></tr>
                            <tr><td>Execução (seguir os passos)</td><td>Execução</td><td>Erros de coleta ou análise invalidam as conclusões</td></tr>
                            <tr><td>Conclusão (avaliar resultado, servir)</td><td>Conclusão</td><td>Falta de medidas concretas torna o estudo acadêmico inútil</td></tr>
                        </tbody>
                    </table>
                    <p>Portanto, entender a metáfora do bolo ajuda o técnico a nunca pular etapas e a manter a qualidade do seu trabalho em licenciamento ambiental.</p>
                </div>
                <div class="img-container">
                    <img src="https://i.pinimg.com/564x/31/5e/cf/315ecf76e78e257aa76fb45fee43ea77.jpg" alt="Metáfora do bolo">
                </div>
            </div>`,
            // PÁGINA 2 - O que são métodos de AIA + figura
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h2>1.2 O que são métodos de AIA e por que usá-los?</h2>
                    <p>A Avaliação de Impacto Ambiental (AIA) é um instrumento preventivo da Política Nacional do Meio Ambiente (Lei 6.938/81). Para que ela seja efetiva, é necessário sistematizar a identificação, a previsão e a análise dos impactos. Existem mais de cem métodos descritos na literatura, cada um adequado a diferentes tipos de empreendimento, disponibilidade de dados e objetivos da avaliação.</p>
                    <p>O uso de um método estruturado evita que os impactos sejam identificados de forma subjetiva ou incompleta. Além disso, permite comparar alternativas, comunicar os resultados a tomadores de decisão e à sociedade, e estabelecer medidas mitigadoras com base em critérios claros.</p>
                    <p><strong>Consequências da escolha inadequada de um método:</strong></p>
                    <ul>
                        <li>- Omissão de impactos importantes.</li>
                        <li>- Superestimação ou subestimação da magnitude dos impactos.</li>
                        <li>- Dificuldade de comunicação com o público e com os órgãos ambientais.</li>
                        <li>- Atraso no licenciamento e necessidade de estudos complementares.</li>
                    </ul>
                </div>
                <div class="img-container">
                    <img src="https://image2.slideserve.com/3870982/lei-6-938-81-l.jpg" alt="Lei 6.938/81">
                </div>
            </div>`,
            // PÁGINA 3 - Tabela de critérios + figura
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h2>Critérios para escolha do método</h2>
                    <p>O técnico em meio ambiente deve saber selecionar o método mais adequado com base nos seguintes critérios:</p>
                    <table>
                        <thead><tr><th>Critério</th><th>Exemplo de decisão</th></tr></thead>
                        <tbody>
                            <tr><td>Tipo e porte do empreendimento</td><td>Rodovia → Overlays; indústria pequena → Check-list.</td></tr>
                            <tr><td>Disponibilidade de dados</td><td>Dados escassos → Ad Hoc; dados abundantes → modelos de simulação.</td></tr>
                            <tr><td>Recursos financeiros e tempo</td><td>Curto prazo → Check-list; longo prazo → matriz ou redes.</td></tr>
                            <tr><td>Experiência da equipe</td><td>Domínio de SIG → Overlays digitais.</td></tr>
                            <tr><td>Exigência legal</td><td>CONAMA 001/86 exige identificação, previsão da magnitude e interpretação da importância (qualquer método que atenda isso é válido).</td></tr>
                            <tr><td>Participação pública</td><td>Métodos visuais (matrizes coloridas, mapas) comunicam melhor.</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="img-container">
                    <img src="https://www.questionpro.com/blog/wp-content/uploads/2023/01/pesquisa-ad-hoc.jpg" alt="Método Ad Hoc">
                </div>
            </div>`,
            // PÁGINA 4 - Exemplos práticos + figura
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h2>Exemplos práticos do dia a dia do técnico ambiental</h2>
                    <ul>
                        <li>- <strong>Triagem (screening):</strong> usa-se check-list simples para decidir se um pequeno posto de combustível precisa de EIA completo.</li>
                        <li>- <strong>Estudo de impacto de uma mineração:</strong> aplica-se Matriz de Leopold e redes de interação para avaliar efeitos em cascata (desmatamento → erosão → assoreamento).</li>
                        <li>- <strong>Planejamento de um gasoduto:</strong> utilizam-se mapas de superposição (overlays) para definir o traçado de menor fragilidade ambiental.</li>
                    </ul>
                    <p>Portanto, conhecer os métodos é condição essencial para a atuação profissional na área de licenciamento e gestão ambiental. O técnico também deve estar atento às fases da AIA (planejamento, execução, conclusão) e à legislação pertinente, conforme será detalhado nos próximos tópicos.</p>
                </div>
                <div class="img-container">
                    <img src="https://www.planejamento.pr.gov.br/sites/default/arquivos_restritos/files/imagem/2026-03/whatsapp_image_2026-03-11_at_12.56.21.jpg" alt="Exemplo prático">
                </div>
            </div>`
        ];

        const totalPages = pages.length;
        let currentPage = 0;
        let currentFontSize = 18;
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeaking = false;

        function updateUI() {
            document.getElementById('pageContent').innerHTML = pages[currentPage];
            const num = currentPage + 1;
            document.getElementById('pageXofY').textContent = `Página ${num} de ${totalPages}`;
            const pct = (num / totalPages) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressPercent').textContent = Math.round(pct) + '%';
            // Desabilita os botões quando não há páginas internas para navegar
            // Mas eles serão usados para navegação externa também
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 0 && newPage < totalPages) {
                currentPage = newPage;
                updateUI();
            } else if (newPage === -1) {
                // Vai para o ÍNDICE (arquivo indice.html)
                window.location.href = 'indice.html';
            } else if (newPage === totalPages) {
                // Vai para a PRÓXIMA PARTE (aia_parte3.html)
                window.location.href = 'aia_parte3.html';
            }
        }

        // Configurar eventos dos botões (agora check não apenas desabilitar)
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');

        function updateButtons() {
            // Não desabilitamos os botões, apenas alteramos o comportamento no clique.
            // Mas para feedback visual, podemos desabilitar se não houver nem interno nem externo? 
            // Sempre há: se for página 0, o anterior vai para índice. Se for última, próximo vai para parte3.
            // Portanto sempre ativos.
            prevBtn.disabled = false;
            nextBtn.disabled = false;
        }

        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));

        // Controles de fonte e áudio (mantidos)
        const pageContentDiv = document.getElementById('pageContent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speakBtn = document.getElementById('speakBtn');
        const rateSelect = document.getElementById('rateSelect');

        function setFontSize(size) {
            pageContentDiv.style.fontSize = size + 'px';
            currentFontSize = size;
        }

        function getFemaleVoice() {
            const voices = synth.getVoices();
            const ptVoices = voices.filter(v => v.lang === 'pt-BR');
            const female = ptVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mulher') || v.name.includes('Samantha') || v.name.includes('Maria'));
            return female || ptVoices[0] || voices[0];
        }

        function startReading() {
            if (!synth) { alert('Seu navegador não suporta síntese de voz.'); return; }
            if (isSpeaking) { stopReading(); return; }
            const text = pageContentDiv.innerText;
            if (!text.trim()) return;
            currentUtterance = new SpeechSynthesisUtterance(text);
            const voice = getFemaleVoice();
            if (voice) currentUtterance.voice = voice;
            currentUtterance.rate = parseFloat(rateSelect.value);
            currentUtterance.onend = function() {
                isSpeaking = false;
                currentUtterance = null;
                speakBtn.textContent = '🔊';
            };
            synth.speak(currentUtterance);
            isSpeaking = true;
            speakBtn.textContent = '⏹️';
        }

        function stopReading() {
            if (synth && synth.speaking) synth.cancel();
            if (currentUtterance) {
                currentUtterance.onend = null;
                currentUtterance = null;
            }
            isSpeaking = false;
            speakBtn.textContent = '🔊';
        }

        fontMinus.addEventListener('click', () => { if (currentFontSize > 12) setFontSize(currentFontSize-2); });
        fontPlus.addEventListener('click', () => { if (currentFontSize < 36) setFontSize(currentFontSize+2); });
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
        });
        speakBtn.addEventListener('click', startReading);
        rateSelect.addEventListener('change', () => {
            if (isSpeaking && currentUtterance) currentUtterance.rate = parseFloat(rateSelect.value);
        });

        setFontSize(18);
        updateUI();
        updateButtons();
        if (synth) synth.getVoices();
    })();
</script>
</body>
</html>
