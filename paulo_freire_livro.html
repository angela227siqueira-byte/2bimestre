                <p>Em 1943, ingressou no curso de Direito da Universidade de Recife e, em 1944, casou-se com sua primeira esposa, a professora Elza Maia Costa de Oliveira, casamento que durou até o falecimento de Elza, em 1986. Em 1947, Freire foi nomeado diretor do Departamento de Educação e Cultura, do Serviço Social da Indústria, iniciando um trabalho com a alfabetização de jovens e adultos carentes e de trabalhadores da indústria.</p>
                <p>Em 1959, Paulo Freire passou no processo seletivo para a cátedra de História e Filosofia da Educação da Escola de Belas Artes da Universidade de Recife, com a tese Educação e atualidade brasileira. Em 1961, o professor tornou-se diretor do Departamento de Extensões Culturais, da Universidade de Recife, o que o possibilitou realizar as primeiras experiências mais amplas com alfabetização de adultos, que culminaram na experiência de Angicos.</p>
                <img src="https://reporterbrasil.org.br/wp-content/uploads/2019/03/Angicos6_Foto-arquivo.jpg" alt="Paulo Freire atuando como educador" class="img-fullwidth">
                <p>Por possibilitar a alfabetização de jovens e adultos em cerca de 40 horas e com baixos custos, o método desenvolvido por Paulo Freire inspirou o Plano Nacional de Alfabetização, que começou a ser encabeçado pelo Ministério da Educação e Cultura (MEC) ainda no governo de João Goulart. A experiência de Angicos causou alvoroço na cidade.</p>
                <button class="video-btn" id="openVideoBtn">🎬 Assistir vídeo: Paulo Freire · Documentário</button>
                <p>Uma greve de trabalhadores de uma obra que se recusaram a trabalhar enquanto não tivessem seus direitos garantidos, como descanso semanal remunerado e uma jornada de trabalho que respeitasse a jornada estabelecida pela Consolidação das Leis Trabalhistas (CLT), foi o início para a acusação de comunismo contra o projeto de alfabetização freireano. Empresários e fazendeiros, primeiramente do Rio Grande do Norte, não aceitaram a reivindicação dos trabalhadores, antes analfabetos e agora entendedores de seus direitos.</p>
                <p>Outra questão entrou em jogo no cenário político: na época, somente poderia votar quem fosse alfabetizado. O Plano Nacional de Alfabetização poderia levar o letramento a até seis milhões de brasileiros, o que significaria seis milhões de novos eleitores fora das classes dominantes. Esses fatores foram decisivos para que, ainda em abril de 1964, o Plano Nacional de Alfabetização fosse cancelado. Esses também foram fatores decisivos para a prisão de Paulo Freire, Marcos Guerra (advogado e um dos coordenadores do projeto em Angicos) e dezenas de outras pessoas, que, como no caso de Freire, também foram exiladas.</p>
                <img src="https://www.diariodocentrodomundo.com.br/wp-content/uploads/2021/09/paulo-freire-2-1.jpg" alt="O retorno do exílio" class="img-fullwidth">
                <p>Paulo Freire passou 70 dias preso e foi exilado. No exílio, foi primeiramente para o Chile, onde coordenou projetos de alfabetização de adultos, pelo Instituto Chileno da Reforma Agrária, por cinco anos. Em 1969, o professor pernambucano foi convidado a lecionar na Universidade de Harvard. Em 1970, foi consultor e coordenador emérito do Conselho Mundial de Igrejas (CMI), com sede em Genebra, na Suíça.</p>
                <p>Até o seu retorno ao Brasil, em 1980, Freire fez viagens a mais de 30 países pelo CMI, prestando consultoria educacional e implementando projetos de educação voltados para a alfabetização, para a redução da desigualdade social e para a garantia de direitos. Foi nesse período em que o pensador brasileiro implementou importantes projetos educativos em Guiné-Bissau, Moçambique, Zâmbia e Cabo Verde.</p>
                <p>Em 1978, a Lei da Anistia permitiu o retorno de exilados políticos. Em 1980, Freire retornou ao Brasil. Após isso, passou a lecionar na Pontifícia Universidade Católica de São Paulo (PUC-SP) e na Universidade de Campinas (Unicamp). Em 1986, sua primeira esposa, Elza, com quem teve cinco filhos, morreu. Em 1988, Freire casou-se com sua segunda esposa, Ana Maria Araújo, com quem permaneceu até a sua morte, em 1997.</p>
                <img src="https://luizaerundina.com.br/wp-content/uploads/2021/09/FPF_ICO_01_1380.png" alt="Mario Cortella, Luiza Erundina e Paulo Freire" class="img-fullwidth">
                <p>Entre 1988 e 1991, Freire foi nomeado secretário de educação do município de São Paulo pela então prefeita, Luiza Erundina, na época filiada ao Partido dos Trabalhadores (PT). Ao sair do cargo antes do término da gestão, Mário Sérgio Cortella, então assessor de Freire e mais tarde seu orientando de doutorado na PUC-SP, ocupou o cargo até o ano de 1992.</p>
                <p>No dia 2 de maio de 1997, Paulo Freire morreu, aos 76 anos, após passar por uma angioplastia e apresentar um complexo quadro de saúde devido a problemas no sistema circulatório. Em vida e postumamente, o professor Paulo Freire foi condecorado com 48 títulos honoríficos.</p>
                <p>Em todo o mundo, cerca de 350 escolas e instituições, como bibliotecas e universidades, levam o seu nome como forma de homenagem. Em 2005, a deputada Luiza Erundina criou um projeto de lei para reconhecer Paulo Freire como Patrono da Educação Brasileira. O projeto de lei somente sancionado em 2012, por meio da Lei 12.612/12, pela então presidente Dilma Rousseff.</p>
                <p>Segundo levantamento feito, em 2016, por Elliot Greeni, pesquisador especialista em estudos sobre desenvolvimento e aprendizagem da London School of Economics, a obra <em>Pedagogia do oprimido</em>, de Paulo Freire, é o terceiro livro mais citado em trabalhos da área de humanidades no mundo. Até o ano do levantamento, o livro de Freire já havia sido citado 72.359 vezes, estando à frente no ranking de pensadores como Michel Foucault, Pierre Bourdieu e Karl Marx. À frente de Freire estavam apenas Thomas Kuhn e Everett Rogers.</p>
            `

            title: "Capítulo 2 · Método Paulo Freire",
            content: `
                <p>No auge da Guerra Fria, os Estados Unidos lançaram um projeto chamado Aliança para o Progresso, que visava a alavancar o processo de crescimento econômico e acabar com o que o bloco capitalista entendia como “crescente comunismo” que vinha assolando a América Latina. No entendimento de quem liderou o projeto, a erradicação do analfabetismo seria uma maneira de frear a ascensão socialista.</p>
                <img src="https://centrodepesquisaeformacao.sescsp.org.br/uploads/AtividadeTable/5a2a96f30f07e7e7380e9164aa599b5b/4019/cheia.jpg" alt="Método Paulo Freire" class="img-fullwidth">
                <p>O Brasil foi um dos contemplados pelo projeto, e no Nordeste, ainda como fase experimental, a cidade de Angicos, no Rio Grande do Norte, foi uma das primeiras grandes experiências de tentativa de erradicação do analfabetismo. A escolha da cidade e a verba destinada ao projeto de Angicos, cerca de 36 dólares por aluno, vieram desse plano norte-americano. Paulo Freire elaborou o projeto, formou uma comissão de coordenadores e treinou professores para aplicar o plano.</p>
                <p>Em 40 horas, percorridas durante quase um mês, 300 jovens e adultos foram alfabetizados pelo método desenvolvido por Freire. O educador brasileiro criticava o modelo de educação que ele chamava de “educação bancária”. Esse modelo é baseado na visão de que o professor é o centro do processo e detentor do conhecimento das matérias, sendo o responsável por depositar aquilo que sabe em seus alunos.</p>
                <p>Freire falava da importância de pensar-se em uma educação capaz de reconhecer a cultura do educando e agir com base nela, naquela realidade, pois somente assim ela faria sentido para aquele que vai ser alfabetizado. Nas palavras do filósofo:</p>
                <p><em>“A leitura do mundo precede a leitura da palavra, daí que a posterior leitura desta não possa prescindir da continuidade da leitura daquele.”</em></p>
                <p>Na visão de Freire, a leitura (e, no mesmo sentido, a escrita) somente fará sentido se for acompanhada de uma capacidade de ler o mundo, de perceber o mundo, de reconhecer os papéis desempenhados pelos atores do mundo e de reconhecer-se como peça naquele mundo. Por isso, Freire agia com base nas palavras que faziam parte do cotidiano dos trabalhadores em processo de alfabetização para ensiná-los.</p>
                <p>Marcos Guerra, advogado e coordenador do projeto em Angicos, conta que “a alfabetização era baseada em 12 a 15 palavras apenas que continham todos os fonemas da língua portuguesa. No debate sobre a palavra trabalho, o que é que vem? Vem as condições de trabalho. Aí evoca discussões sobre trabalho, condição de trabalho [...] remuneração de trabalho, garantias, direitos, deveres”. Palavras como tijolo, barro, trabalho, labuta e telha eram as norteadoras do método, que não foca no conteúdo ensinado, mas no processo.</p>
                <p>Outra característica do método freireano é a tentativa de levar uma conscientização política e de classe para os educandos. Talvez esse seja o fator que mais tenha despertado a ira dos setores conservadores, responsáveis por extinguir o Plano Nacional da Alfabetização e por exilar o professor pernambucano. Os depoimentos descritos, a seguir, atestam essa ideia:</p>
                <p>“Depois do curso, uma greve na cidade parou a construção de uma obra. Acredita-se que eles teriam sido inspirados pelo ensino dos direitos trabalhistas em sala de aula, com a metodologia freiriana. Os trabalhadores disseram ao dono da empresa que sabiam que tinham direitos. Eles pediam carteira assinada, repouso semanal remunerado e férias. E o patrão disse: ‘eu não dou isso não, ninguém dá’, lembra Guerra.</p>
                <p>Eles passaram a reivindicar direitos, como repouso semanal remunerado e jornada de trabalho, que era intensiva e ultrapassava as horas estabelecidas pela lei. A carteira assinada os entusiasmava, conta a juíza aposentada Valquíria Félix da Silva, 78, que foi uma das professoras do curso na cidade.</p>
                <p>A obra de Paulo Freire e o seu método são profundamente marcados pela insistência de levantar-se um novo tipo de educação, capaz de dar autonomia às classes dominadas por meio do diálogo e de uma educação emancipadora.</p>
                <p>Para quem se simpatiza com as ideias do filósofo pernambucano, essa tarefa é necessária para a criação de um novo Brasil, mais justo e igualitário. Para quem discorda de sua obra (não pretendemos fazer uma afirmação generalizadora, pois podem existir críticas pontuais plausíveis acerca do método ou da obra freireana, e lembrando que as críticas não presumem sua anulação), há, em geral, um medo de que ela seja a cartilha para fazer o que setores conservadores têm chamado de “doutrinação marxista nas salas de aula”.</p>
                <p>Essa acusação, sustentada nos dias atuais por grupos políticos ligados à extrema-direita, era a mesma que condenava Paulo Freire em 1964. O doutor em Educação pela Universidade de São Paulo (USP) e biógrafo de Freire, Sérgio Haddad, conta, em matéria publicada na Folha de São Paulo, acerca do relatório escrito sobre Freire para justificar a sua prisão, dias após o seu exílio.</p>
                <p>O inquérito, comandado pelo tenente-coronel Hélio Ibiapina Lima, dizia que Paulo Freire era “um dos maiores responsáveis pela subversão imediata dos menos favorecidos”, que “sua atuação no campo da alfabetização de adultos nada mais é que uma extraordinária tarefa marxista de politização das mesmas” e que Freire “é um cripto-comunista encapuçado sob a forma de alfabetizador”.</p>
            `

                <h2>As Obras de Paulo Freire</h2>
                <img src="https://cdn.pensador.com/img/frase/pa/ul/paulo_freire_ninguem_educa_ninguem_ninguem_educa_a_si_m_ljwo5zl.jpg" alt="Frase de Paulo Freire" class="img-fullwidth">
                <p>Entre publicações em vida, publicações póstumas, cartas, entrevistas, ensaios e artigos, somam-se em sua obra quase 40 livros publicados. Os mais importantes, para a compreensão da trajetória intelectual do filósofo e educador, são as seguintes:</p>
                <p><strong>Pedagogia do oprimido:</strong> escrito ainda no início do exílio, quando Freire estava no Chile, o livro propõe uma revisão da relação entre educadores e educandos. O diálogo deve ser a base primeira para a constituição do processo de ensino e aprendizagem. Segundo Freire, “o diálogo é uma exigência existencial”. Com base nesse pressuposto, ele reconhece que a educação dialógica é a chave para levar uma educação libertadora às massas, sem excluir a própria massa do processo educativo. Em sua reflexão, Freire questiona-se: “Como posso dialogar, se parto de que a pronúncia do mundo é tarefa de homens seletos e que a presença das massas na história é sinal de sua deterioração que devo evitar?” Reconhecendo as massas e os outros e respeitando a diferença dos outros é como o educador deve atuar. Freire defende que a finalidade desse trabalhoso processo é propiciar uma libertação: a emancipação das massas de oprimidos por meio da educação.</p>
                <p><strong>Educação como prática da liberdade:</strong> escrito no exílio após o término de Pedagogia do oprimido, esse livro é uma autocrítica de sua atuação e uma proposta de educação que visa a acabar com a exclusão. Ele aponta a relação intrínseca entre educação, conscientização e inclusão.</p>
                <p><strong>Cartas à Guiné-Bissau:</strong> livro escrito entre 1976 e 1977, período em que Freire atuou no projeto de alfabetização popular promovido em Guiné-Bissau após a sua independência. O conjunto de cartas que compõem a obra tem um objetivo mais reflexivo de apontar a potência, a paixão e a criação daquele povo recém-independente e a aproximação da realidade social africana com a brasileira da época.</p>
                <p><strong>Pedagogia da autonomia:</strong> Freire tem um objetivo muito claro nesse livro de apresentar um conjunto de conhecimentos e práticas indispensáveis a qualquer educador. Como o próprio autor anuncia no escrito, não importa se se trata de um professor ou professora progressista ou reacionário, deve-se saber daquele conjunto básico. O livro carrega em seu primeiro capítulo o título que resume grande parte da defesa de Freire no reconhecimento da alteridade e do respeito à individualidade do educando: “Não há docência sem discência”. Um desses elementos básicos é o reconhecimento da importante relação entre teoria e prática que deve ser primordial e indissolúvel. Segundo Freire, “a reflexão crítica sobre a prática torna-se uma exigência da relação Teoria/Prática sem a qual a teoria pode ir virando blábláblá, e a prática, ativismo”.</p>
                <h2>Algumas Frases de Paulo Freire</h2>
                <p>“A leitura do mundo precede a leitura da palavra, daí que a posterior leitura desta não possa prescindir da continuidade da leitura daquele.”</p>
                <p>“Não existe docência sem discência.”</p>
                <p>“Se a educação sozinha não transforma a sociedade, sem ela tampouco a sociedade muda.”</p>
                <p>“Ninguém educa ninguém, ninguém educa a si mesmo, os homens educam-se entre si, mediatizados pelo mundo.”</p>
                <p>“A alegria não chega apenas no encontro do achado, mas faz parte do processo da busca. E ensinar e aprender não pode dar-se fora da procura, fora da boniteza e da alegria.”</p>
                <p>“Ninguém ignora tudo. Ninguém sabe tudo. Todos nós sabemos alguma coisa. Todos nós ignoramos alguma coisa. Por isso aprendemos sempre.”</p>

    // ============================================================

    let currentChapter = 0;

        const html = `
            <div id="chapter-${index}" class="chapter active">

                ${chapter.content}
                ${sendBtnHtml}
            </div>

        chapterContainer.innerHTML = html;
        prevChapterBtn.disabled = (index === 0);
        nextChapterBtn.disabled = (index === chapters.length-1);
        document.querySelectorAll('.chapter-menu a').forEach((link, i) => {
            if (i === index) link.style.fontWeight = 'bold';
            else link.style.fontWeight = 'normal';
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
        stopAudio();
        if (index === chapters.length-1) {
            const sendBtn = document.getElementById('sendReportBtn');
            if (sendBtn) sendBtn.addEventListener('click', enviarRelatorio);

    // Menu

            currentChapter = idx;
            loadChapter(currentChapter);
        });
        chapterMenuDiv.appendChild(link);

    let synth = window.speechSynthesis;

        const activeChapter = document.querySelector('.chapter.active');
        if (!activeChapter) return;
        const text = activeChapter.innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        utterance.voice = voices.find(v => v.lang === 'pt-BR') || voices[0];
        const rate = parseFloat(document.getElementById('rateSelect').value);
        utterance.rate = rate;
        utterance.onend = () => {
            isSpeaking = false;
            document.getElementById('speakToggleBtn').innerHTML = '🔊 Ouvir página';

        isSpeaking = true;
        currentUtterance = utterance;
        document.getElementById('speakToggleBtn').innerHTML = '⏹️ Parar leitura';

                <p>Você concluiu a leitura do livro digital sobre Paulo Freire.</p>
                <p>Seu relatório foi enviado com sucesso para o professor.</p>
                <p>Agora você pode fechar esta janela ou continuar navegando.</p>
                <button class="close-congrats" id="closeCongratsBtn">Fechar</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('closeCongratsBtn').addEventListener('click', () => {
            overlay.remove();
            // Opcional: redirecionar para uma página em branco ou simplesmente fechar
            // Vamos apenas remover o overlay e deixar o conteúdo normal.
        });
    }

    // ============================================================
    // 8. INICIALIZAÇÃO E VÍDEO
    // ============================================================
    mostrarIdentificacao();

    const modal = document.getElementById('videoModal');
    const closeSpan = document.querySelector('.close-modal');
    const iframe = document.getElementById('youtubeIframe');
    document.addEventListener('click', (e) => {
        if (e.target.id === 'openVideoBtn') {
            modal.style.display = 'block';
            iframe.src = "https://www.youtube.com/embed/cB5kSRL0KxI?autoplay=1";
        }
    });
    closeSpan.addEventListener('click', () => {
        modal.style.display = 'none';
        iframe.src = "";
    });
    window.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
            iframe.src = "";
        }
    });
</script>
</body>
</html>
