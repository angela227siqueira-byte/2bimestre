<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz · Tempos da natureza · Capítulo 1 (Sem identificação)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .quiz-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f3d2e;
            margin-bottom: 12px;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #2a5e4a;
            margin-bottom: 20px;
            font-style: italic;
        }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }
        .options { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .opt-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 48px;
            cursor: pointer;
            transition: 0.1s;
        }
        .opt-btn.selected { background: #1a5e44; color: white; border-color: #1a5e44; }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .feedback.correct { background: #d4edda; border-left: 6px solid #28a745; }
        .feedback.wrong { background: #f8d7da; border-left: 6px solid #dc3545; }
        .toolbar { display: flex; justify-content: space-between; gap: 12px; margin: 20px 0 10px; }
        .tool-btn {
            background: #ecf3ef; border: 1px solid #b3cdbf; padding: 12px; font-size: 1rem;
            border-radius: 48px; flex: 1; text-align: center; cursor: pointer;
        }
        .progress { font-size: 0.85rem; margin-bottom: 8px; color: #1a5e44; text-align: right; }
        .font-controls { display: flex; gap: 8px; margin-bottom: 15px; justify-content: flex-end; }
        .font-btn {
            background: #e6f0ea; border: none; padding: 6px 12px; border-radius: 40px; cursor: pointer; font-weight: bold;
        }
        .result-screen { text-align: center; }
        .result-box { background: #f0f7f3; padding: 20px; border-radius: 28px; margin: 20px 0; }
        .restart-btn {
            background: #1a5e44; color: white; border: none; padding: 14px; border-radius: 60px; width: 100%; cursor: pointer; margin-top: 10px;
        }
        .stats { font-size: 1.1rem; line-height: 1.8; }
        @media (max-width: 640px) { .quiz-wrapper { max-width: 100%; padding: 15px; } .opt-btn { padding: 8px 16px; } }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <!-- TELA DO QUIZ (direto, sem identificação) -->
    <div id="quizScreen" class="screen active">
        <div class="font-controls">
            <button class="font-btn" id="fontMinus">A−</button>
            <button class="font-btn" id="fontPlus">A+</button>
            <button class="font-btn" id="fullscreenBtn">⛶ Tela cheia</button>
        </div>
        <div class="title">🌍 Tempos da natureza e ação humana</div>
        <div class="sub">Capítulo 1 – 30 afirmações para julgar VERDADEIRO ou FALSO</div>
        <div class="progress" id="progressText">Questão 1 de 30</div>
        <div id="questionArea">
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsArea">
                <button class="opt-btn" data-value="true">✅ Verdadeiro</button>
                <button class="opt-btn" data-value="false">❌ Falso</button>
            </div>
            <div class="feedback" id="feedbackArea" style="display: none;"></div>
        </div>
        <div class="toolbar">
            <button class="tool-btn" id="prevBtn" disabled>◀ Anterior</button>
            <button class="tool-btn" id="nextBtn" disabled>Próxima ▶</button>
        </div>
    </div>

    <!-- TELA DE RESULTADO (estatística) -->
    <div id="resultScreen" class="screen result-screen">
        <h2>📊 Estatística da sua pontuação</h2>
        <div class="result-box" id="resultContent"></div>
        <button class="restart-btn" id="restartQuizBtn">🔄 Refazer quiz</button>
    </div>
</div>

<script>
    // =================== 30 QUESTÕES (Capítulo 1) ===================
    const questions = [
        { text: "A interferência humana no meio natural começou com a Revolução Industrial no século XVIII.", correct: false, justification: "A intervenção humana existe desde o surgimento do gênero Homo (2,5 milhões de anos), mas se intensificou a partir da Revolução Industrial." },
        { text: "Antes da agricultura intensiva, os rios lançavam cerca de 10 bilhões de toneladas de sedimentos por ano nos oceanos; hoje esse valor chega a 25 bilhões de toneladas.", correct: true, justification: "Dados do capítulo mostram esse aumento devido à erosão acelerada pelas atividades humanas." },
        { text: "A idade da Terra é de aproximadamente 4,6 a 5 bilhões de anos, calculada a partir da datação de meteoritos e da radioatividade das rochas.", correct: true, justification: "Baseado no estudo de meteoritos e na desintegração radioativa, essa é a estimativa científica atual." },
        { text: "O Antropoceno foi oficialmente aprovado como uma nova época geológica pela União Internacional de Ciências Geológicas em março de 2024.", correct: false, justification: "Em março de 2024, os cientistas não aprovaram a inclusão; o termo ainda é usado informalmente para descrever a ação humana." },
        { text: "Os crátons são estruturas geológicas jovens, formadas por dobramentos modernos na Era Cenozoica.", correct: false, justification: "Crátons são blocos de rochas antigas (éons Arqueano e Proterozoico), não dobramentos recentes." },
        { text: "A Teoria da Tectônica de Placas explica que a crosta terrestre é dividida em placas que se movem, e as bordas coincidem com áreas de vulcões e terremotos.", correct: true, justification: "Essa teoria é fundamental para entender a deriva continental e a distribuição de atividades sísmicas e vulcânicas." },
        { text: "Os agentes internos do relevo (endógenos) incluem a erosão causada por rios, ventos e geleiras.", correct: false, justification: "Esses são agentes externos (exógenos). Agentes internos são tectonismo, vulcanismo e terremotos." },
        { text: "Nas planícies predomina a sedimentação, enquanto nos planaltos a erosão supera a sedimentação.", correct: true, justification: "Conforme a classificação das formas de relevo, essa é a diferença fundamental entre planícies e planaltos." },
        { text: "Cerca de 90% das mortes por desastres naturais ocorrem em países desenvolvidos, que possuem sistemas de alerta precoces.", correct: false, justification: "Segundo a ONU, mais de 90% das mortes ocorrem em países em desenvolvimento, devido à maior vulnerabilidade." },
        { text: "O Fast Fashion é um modelo de produção têxtil que prioriza design sustentável, ciclo de vida longo e reaproveitamento de tecidos.", correct: false, justification: "Fast Fashion é o oposto: produção rápida, descarte precoce e baixa qualidade. Slow Fashion que tem essas características." },
        { text: "Cerca de 35% dos microplásticos que chegam aos oceanos vêm de roupas com tecidos sintéticos, liberados durante a lavagem.", correct: true, justification: "Dados da União Internacional para a Conservação da Natureza indicam essa fonte significativa de poluição marinha." },
        { text: "As massas de ar que atuam no Brasil incluem a Equatorial continental (quente/úmida) e a Polar atlântica (fria/úmida), entre outras.", correct: true, justification: "O capítulo lista cinco massas: Tropical atlântica, Tropical continental, Equatorial atlântica, Equatorial continental e Polar atlântica." },
        { text: "O fenômeno El Niño causa secas na região Nordeste do Brasil e chuvas intensas no Sudeste da América do Sul.", correct: true, justification: "O aquecimento do Pacífico equatorial altera os padrões de precipitação, resultando nesses efeitos." },
        { text: "O clima subtropical úmido no Brasil ocorre predominantemente na Região Norte, com temperaturas elevadas o ano todo.", correct: false, justification: "O clima subtropical úmido é característico da Região Sul e partes de São Paulo e Mato Grosso do Sul, com estações bem definidas." },
        { text: "Os 'rios voadores' são correntes de ar carregadas de umidade que partem da Amazônia e levam chuva para o Centro-Oeste, Sudeste e Sul do Brasil.", correct: true, justification: "Termo cunhado pelo climatologista José Marengo; a evapotranspiração da floresta alimenta essas correntes." },
        { text: "A água doce proveniente de aquíferos pode levar até 10 mil anos para se renovar, o que exige manejo sustentável.", correct: true, justification: "O tempo de permanência da água em reservatórios subterrâneos é muito longo, tornando-os vulneráveis à extração excessiva." },
        { text: "O Brasil detém cerca de 12% da água doce disponível no planeta, mas sua distribuição é desigual, com concentração na Região Norte.", correct: true, justification: "Dados da Agência Nacional de Águas (ANA) confirmam esses números e a concentração na Bacia Amazônica." },
        { text: "Os rompimentos das barragens em Mariana (2015) e Brumadinho (2019) ocorreram no estado do Rio de Janeiro e contaminaram o Rio Paraíba do Sul.", correct: false, justification: "Ambos ocorreram em Minas Gerais. Mariana afetou o Rio Doce; Brumadinho, o Rio Paraopeba." },
        { text: "A dessalinização da água do mar é uma tecnologia já usada em países como Israel, Califórnia e Espanha, embora tenha custo energético elevado.", correct: true, justification: "O capítulo menciona esses exemplos e os desafios da dessalinização (custo e descarte de salmoura)." },
        { text: "A tundra é um bioma caracterizado por florestas de coníferas (taiga) e solos permanentemente congelados (permafrost).", correct: false, justification: "Tundra é vegetação rasteira (líquens, musgos) sobre permafrost. A taiga é floresta boreal de coníferas." },
        { text: "A savana brasileira, conhecida como Cerrado, apresenta árvores esparsas, arbustos e vegetação rasteira, com clima tropical úmido-seco.", correct: true, justification: "O Cerrado é um dos domínios morfoclimáticos do Brasil, com essas características." },
        { text: "O Domínio dos Mares de Morros, no litoral brasileiro, apresenta morros arredondados e abriga a Mata Atlântica, altamente devastada.", correct: true, justification: "Descrito por Aziz Ab’Sáber, esse domínio sofreu intensa ocupação e desmatamento." },
        { text: "A Lei de Terras de 1850 facilitou o acesso de negros libertos e pequenos agricultores à terra no Brasil Imperial.", correct: false, justification: "A Lei de Terras dificultou o acesso, pois só permitia aquisição mediante compra, excluindo posseiros e comunidades tradicionais." },
        { text: "O Golpe da Maioridade (1840) antecipou a coroação de Dom Pedro II, que tinha 15 anos, e marcou o início do Segundo Reinado.", correct: true, justification: "Evento histórico descrito no capítulo (contexto do Brasil Imperial, embora o foco principal seja natureza, a questão é contextual)." },
        { text: "A Revolução Farroupilha (1835-1845) foi um movimento popular liderado por escravizados no Maranhão.", correct: false, justification: "Farroupilha foi no Rio Grande do Sul, liderado pela elite gaúcha; a Balaiada foi no Maranhão (popular)." },
        { text: "O aquífero Guarani é um dos maiores reservatórios de água doce subterrânea do mundo, compartilhado por Brasil, Argentina, Paraguai e Uruguai.", correct: true, justification: "Informação presente no capítulo sobre recursos hídricos transfronteiriços." },
        { text: "O geoprocessamento é uma área técnica que coleta e interpreta dados espaciais, mas não tem aplicação em estudos de impacto ambiental.", correct: false, justification: "Geoprocessamento é essencial para mapeamento, monitoramento e análise de impactos ambientais." },
        { text: "O movimento Slow Fashion defende o design sustentável, aumento do ciclo de vida das roupas e redução do consumo descartável.", correct: true, justification: "Conforme o box 'Indústria têxtil e sustentabilidade', essa é a proposta do Slow Fashion." },
        { text: "A massa Polar atlântica influencia o clima brasileiro principalmente no verão, trazendo calor e umidade para a Região Norte.", correct: false, justification: "A Polar atlântica atua no inverno, provocando quedas de temperatura, geadas e chuvas frontais em todo o litoral." },
        { text: "A sucessão ecológica é o processo gradual de mudança da comunidade biológica, começando com espécies pioneiras (líquens, musgos) que preparam o ambiente para outras espécies.", correct: true, justification: "Conceito explicado no tópico 'Tempo evolutivo da vida'." }
    ];

    const total = questions.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);
    let userJustification = new Array(total).fill(null);

    // Elementos DOM
    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const questionText = document.getElementById('questionText');
    const optionsArea = document.getElementById('optionsArea');
    const feedbackArea = document.getElementById('feedbackArea');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressText = document.getElementById('progressText');
    const restartQuizBtn = document.getElementById('restartQuizBtn');
    const resultContent = document.getElementById('resultContent');
    const fontMinus = document.getElementById('fontMinus');
    const fontPlus = document.getElementById('fontPlus');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    // Ajuste de fonte (acessibilidade)
    let currentFontSize = 16;
    function setFontSize(size) {
        document.querySelector('.quiz-wrapper').style.fontSize = size + 'px';
        const els = document.querySelectorAll('.question-text, .feedback, .opt-btn, .tool-btn, .restart-btn');
        els.forEach(el => el.style.fontSize = size + 'px');
        currentFontSize = size;
    }
    fontMinus.addEventListener('click', () => setFontSize(Math.max(12, currentFontSize-2)));
    fontPlus.addEventListener('click', () => setFontSize(Math.min(36, currentFontSize+2)));
    fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });

    function renderQuestion() {
        const q = questions[currentIndex];
        questionText.innerText = `${currentIndex+1}. ${q.text}`;
        feedbackArea.style.display = 'none';
        feedbackArea.className = 'feedback';
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(btn => btn.classList.remove('selected'));
        const selected = userAnswers[currentIndex];
        if (selected !== null) {
            btns.forEach(btn => {
                if ((btn.getAttribute('data-value') === 'true' && selected === true) ||
                    (btn.getAttribute('data-value') === 'false' && selected === false)) {
                    btn.classList.add('selected');
                }
            });
            if (userJustification[currentIndex]) {
                const isCorrect = (selected === questions[currentIndex].correct);
                feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
                feedbackArea.style.display = 'block';
                feedbackArea.innerHTML = userJustification[currentIndex];
            }
        }
        progressText.innerText = `Questão ${currentIndex+1} de ${total}`;
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = false;
    }

    function selectAnswer(value) {
        const isTrue = (value === 'true');
        userAnswers[currentIndex] = isTrue;
        const q = questions[currentIndex];
        const isCorrect = (isTrue === q.correct);
        const correctText = q.correct ? "Verdadeiro" : "Falso";
        const explanation = `<strong>${isCorrect ? '✓ Correto!' : '✗ Incorreto'}</strong><br>Justificativa: ${q.justification}<br><span style="font-size:0.9rem;">Resposta correta: ${correctText}.</span>`;
        userJustification[currentIndex] = explanation;
        feedbackArea.classList.remove('correct', 'wrong');
        feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
        feedbackArea.style.display = 'block';
        feedbackArea.innerHTML = explanation;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(btn => btn.classList.remove('selected'));
        const selectedBtn = Array.from(btns).find(btn => btn.getAttribute('data-value') === value);
        if (selectedBtn) selectedBtn.classList.add('selected');
    }

    optionsArea.addEventListener('click', (e) => {
        const btn = e.target.closest('.opt-btn');
        if (btn) selectAnswer(btn.getAttribute('data-value'));
    });
    prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderQuestion(); } });
    nextBtn.addEventListener('click', () => {
        if (userAnswers[currentIndex] === null) {
            alert('Por favor, responda a questão antes de avançar.');
            return;
        }
        if (currentIndex < total-1) { currentIndex++; renderQuestion(); }
        else mostrarResultado();
    });

    function mostrarResultado() {
        let acertos = 0;
        let erros = 0;
        for (let i = 0; i < total; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) acertos++;
            else if (userAnswers[i] !== null) erros++;
        }
        const percentual = (acertos / total) * 100;
        const nota = (acertos / total) * 10;

        // Mensagem personalizada
        let mensagem = "";
        if (percentual >= 85) mensagem = "⭐ Excelente! Você domina o conteúdo do capítulo. Parabéns!";
        else if (percentual >= 70) mensagem = "👍 Muito bom! Estude os tópicos que errou e tente novamente.";
        else if (percentual >= 50) mensagem = "📘 Bom, mas dá para melhorar. Releia as seções sobre os temas que teve mais dificuldade.";
        else mensagem = "📚 Que tal revisar o capítulo? Leia com calma e depois refaça o quiz.";

        const resultadoHTML = `
            <div class="stats">
                <p><strong>✅ Acertos:</strong> ${acertos} (${percentual.toFixed(1)}%)</p>
                <p><strong>❌ Erros:</strong> ${erros}</p>
                <p><strong>🎓 Nota (0 a 10):</strong> ${nota.toFixed(1)}</p>
                <p><strong>📊 Percentual de acerto:</strong> ${percentual.toFixed(1)}%</p>
                <hr style="margin: 15px 0;">
                <p>${mensagem}</p>
            </div>
        `;
        resultContent.innerHTML = resultadoHTML;
        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');
    }

    // Refazer o quiz (reinicia todas as variáveis)
    restartQuizBtn.addEventListener('click', () => {
        userAnswers = new Array(total).fill(null);
        userJustification = new Array(total).fill(null);
        currentIndex = 0;
        resultScreen.classList.remove('active');
        quizScreen.classList.add('active');
        renderQuestion();
    });

    renderQuestion();
    setFontSize(16);
</script>
</body>
</html>
