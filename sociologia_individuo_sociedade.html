<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📘 Indivíduo e sociedade · Perspectivas sociológicas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
        }

        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .fixed-header {
            margin-bottom: 12px;
            border-bottom: 2px solid #dde5e0;
            padding-bottom: 8px;
        }
        .fixed-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f3d2e;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a5e44;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: #dee6e1;
            height: 7px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #1a7a58;
            height: 7px;
            width: 0%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.5;
            margin: 0 2px;
            scroll-behavior: smooth;
        }
        .text-content p {
            margin-bottom: 1em;
        }
        .text-content h2, .text-content h3, .text-content h4 {
            margin: 1.2em 0 0.3em;
            color: #154e3a;
            font-weight: 600;
        }

        /* Layout flexível para imagem + texto */
        .img-text-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .img-container {
            flex: 0 0 auto;
            max-width: 35vw;
            text-align: center;
        }
        .img-container img {
            height: 50vh;
            max-height: 400px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .img-container iframe {
            width: 100%;
            height: 50vh;
            max-height: 400px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .text-container {
            flex: 1;
            min-width: 200px;
        }
        .right-image .text-container { order: 1; }
        .right-image .img-container { order: 2; }
        .left-image .text-container { order: 2; }
        .left-image .img-container { order: 1; }

        .toolbar-single {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            padding: 4px 0 8px;
            border-top: 1px solid #dde5e0;
            border-bottom: 1px solid #dde5e0;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 10px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; border-color: #b6ccc1; pointer-events: none; }
        select.tool-btn { background: #ecf3ef; width: auto; }

        .capa {
            text-align: center;
            padding: 40px 20px;
        }
        .capa h1 { font-size: 36px; margin-bottom: 20px; color: #0f3d2e; }
        .capa h2 { font-size: 28px; margin-bottom: 40px; color: #1a5e44; }
        .capa p { font-size: 22px; color: #2a5e4a; }

        .congrats-page {
            text-align: center;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50vh;
        }
        .congrats-page h2 { color: #1a5e44; margin-bottom: 10px; font-size: 2rem; }
        .congrats-page p { margin: 20px 0; }

        @media (max-width: 700px) {
            .reader-wrapper { max-width: 98%; padding: 15px; }
            .tool-btn { padding: 8px 10px; min-width: 50px; font-size: 0.9rem; }
            .img-text-row { flex-direction: column; }
            .img-container { max-width: 100%; text-align: center; }
            .img-container img, .img-container iframe { height: auto; max-height: 300px; width: auto; max-width: 90%; }
            .right-image .text-container, .right-image .img-container,
            .left-image .text-container, .left-image .img-container { order: unset; }
            .capa h1 { font-size: 28px; }
            .capa h2 { font-size: 24px; }
            .capa p { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div id="readerScreen" class="screen active">
        <div class="fixed-header">
            <h1>Indivíduo e sociedade · Perspectivas sociológicas</h1>
            <div class="progress-row">
                <span id="pageXofY">Página 1 de 13</span>
                <span id="progressPercent">8%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
        <div class="text-content" id="pageContent"></div>
        <div class="toolbar-single">
            <button class="tool-btn" id="fontMinusBtn" title="Diminuir fonte">A−</button>
            <button class="tool-btn" id="fontPlusBtn" title="Aumentar fonte">A+</button>
            <button class="tool-btn" id="fullscreenBtn" title="Tela cheia">⛶</button>
            <button class="tool-btn" id="prevBtnInline" title="Página anterior">◀</button>
            <button class="tool-btn" id="nextBtnInline" title="Próxima página">▶</button>
            <button class="tool-btn" id="speakBtn" title="Ouvir/Parar">🔊</button>
            <select id="rateSelect" class="tool-btn" style="width: auto;">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONTEÚDO DAS PÁGINAS ----------
        const pageContents = [
            // PÁGINA 0 - CAPA
            `<div class="capa">
                <h1>A relação entre indivíduo e sociedade</h1>
                <h2>Perspectivas sociológicas</h2>
                <p>Professora Angela Siqueira</p>
            </div>`,
            // PÁGINA 1 - ÍNDICE NUMERADO (conforme edição manual de Fabrício)
            `<div class="text-container" style="max-width:100%;">
                <h3>📌 Índice</h3>
                <ol>
                    <li>1. Introdução – três matrizes clássicas</li>
                    <li>2. O objeto de estudo da sociologia</li>
                    <li>3. Fatos sociais (Durkheim)</li>
                    <li>4. Ação social (Max Weber)</li>
                    <li>5. Tipologia da ação social (Weber)</li>
                    <li>6. Perspectiva materialista histórica (Marx e Engels)</li>
                    <li>7. Anthony Giddens e a reflexividade</li>
                    <li>8. Pierre Bourdieu e o habitus</li>
                    <li>9. Heleieth Saffioti – mulher na sociedade de classes</li>
                    <li>10. Charles Wright Mills – imaginação sociológica</li>
                </ol>
            </div>`,
            
            // ----- TÓPICO 1: Três matrizes clássicas -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>1. Introdução – três matrizes clássicas</h3>
                    <p>No século XIX, três grandes correntes definiram princípios gerais da sociologia. A primeira, associada a Émile Durkheim, defende que a sociedade molda os indivíduos por meio da coercitividade dos fatos sociais. A segunda, com Max Weber, entende a sociedade como resultado da ação social dos indivíduos. A terceira, formulada por Karl Marx e Friedrich Engels, interpreta sociedade e indivíduos como expressão das contradições de classe. Essas diferentes abordagens mostram que múltiplas teorias podem explicar as complexas relações entre indivíduo e sociedade. Elas não representam um esquema evolutivo, mas modos distintos de construir conhecimento sociológico.</p>
                </div>
                <div class="img-container">
                    <img src="https://cafecomsociologia.com/wp-content/uploads/2016/05/individuo_versus_sociedade.png" alt="" aria-hidden="true">
                </div>
            </div>`,
            
            // ----- TÓPICO 2: Objeto da sociologia -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://adilsoncardoso.com/wp-content/uploads/2023/05/Sociologia.jpg" alt="" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>2. O objeto de estudo da sociologia</h3>
                    <p>Toda ciência tem um objeto específico: a física estuda a matéria e os fenômenos relacionados a ela no tempo e no espaço; a biologia se ocupa dos organismos vivos. A sociologia, por sua vez, teve seu objeto de estudo sistematizado por Émile Durkheim no século XIX. Para Durkheim, a sociedade é constituída por fenômenos que podem ser compreendidos separadamente da consciência dos indivíduos nos quais se manifestam. Ele denominou esses fenômenos de <strong>fatos sociais</strong>.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 3: Fatos sociais (Durkheim) – slide -----
            `<div class="img-text-row right-image">
                <div class="img-container">
                    <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vTREBD56gNJdNDRbVJkivI7O04QaIP2B_tBvgb3rgNrELergXVz7UUw-EDG608dScm-y8rK9kdg6hLf/pubembed?start=true&loop=false&delayms=3000" frameborder="0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true" title="" aria-hidden="true" tabindex="-1"></iframe>
                </div>
                <div class="text-container">
                    <h3>3. Fatos sociais (Durkheim)</h3>
                    <p><strong>Definição:</strong> fatos sociais são formas de pensar, sentir e agir cuja manifestação coletiva constitui a sociedade. Eles apresentam três características principais: são <strong>externos</strong> aos indivíduos (antecedem e independem da vontade), <strong>coercitivos</strong> (impõem penalidades a quem descumpre) e <strong>gerais</strong> (aplicam-se a todos os integrantes). Um exemplo cotidiano são as regras de silêncio numa biblioteca: elas não dependem de cada indivíduo, punem quem as viola e valem para todos. Outros exemplos incluem o modo de falar, vestir-se e agir em diferentes ambientes (casa, escola, rua). Essas práticas estão ligadas à ideia de <strong>consciência coletiva</strong> – o conjunto de sentimentos e crenças comuns à maioria dos membros da sociedade.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 4: Ação social (Weber) – slide -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vRzp9B3PPhHDi6aWJwlH5Jo511OO9rxQ5h395nfRnfDfyw14jzvbRJo1xlIiBDdvUkApDiVhwP7IIsw/pubembed?start=true&loop=false&delayms=3000" frameborder="0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true" title="" aria-hidden="true" tabindex="-1"></iframe>
                </div>
                <div class="text-container">
                    <h3>4. Ação social (Max Weber)</h3>
                    <p>Para Weber, o ponto de partida da análise sociológica é a ação dos indivíduos e suas intenções em relação a outras pessoas. A sociedade só pode ser compreendida a partir das relações entre indivíduos racionais. O objeto da sociologia é o <strong>sentido da ação social</strong>. É importante distinguir ação social de comportamento coletivo: por exemplo, abrir o guarda‑chuva na chuva não é ação social (não considera a ação dos outros), mas desviar para evitar uma colisão ou prestar socorro já é ação social. Outros exemplos incluem obedecer à ordem de um policial, um pai agindo em defesa do filho ou um fiel que jejua por orientação religiosa.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 5: Tipologia da ação social -----
            `<div class="img-text-row right-image">
                <div class="img-container">
                    <img src="https://blogdoenem.com.br/wp-content/uploads/2017/02/3.jpg" alt="" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>5. Tipologia da ação social (Weber)</h3>
                    <p>Weber identificou quatro tipos fundamentais de ação social. A <strong>ação tradicional</strong> é motivada por hábitos ou costumes, como cumprimentar alguém com um aperto de mãos. A <strong>ação afetiva</strong> é determinada por sentimentos ou estados emocionais, como uma gargalhada espontânea. A <strong>ação racional orientada a valores</strong> baseia-se na crença consciente em um valor, independentemente das consequências – por exemplo, um ativista que participa de uma manifestação mesmo correndo risco de repressão. Por fim, a <strong>ação racional orientada a fins</strong> é aquela determinada por um cálculo racional de meios para alcançar objetivos específicos, como a estratégia de um estudante para ser aprovado no vestibular.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 6: Marx e Engels -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://static.todamateria.com.br/upload/ma/te/materialismo-historico-og.jpg" alt="" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>6. Perspectiva materialista histórica (Karl Marx e Friedrich Engels)</h3>
                    <p>Para Marx e Engels, a base material (a produção) condiciona a vida social, política e cultural. Eles afirmam que "os homens fazem a sua própria história; contudo, não a fazem de livre e espontânea vontade, pois não são eles quem escolhem as circunstâncias sob as quais ela é feita". A posição social de cada indivíduo é definida por sua relação com os <strong>meios de produção</strong> (terras, fábricas, máquinas). Isso divide a sociedade em <strong>classes sociais</strong> com interesses antagônicos: a burguesia (proprietária dos meios de produção) e o proletariado (trabalhadores). A propriedade privada é a causa da dominação. A greve é uma expressão da contradição entre classes. Para Marx, a classe social é a unidade de análise sociológica.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 7: Giddens -----
            `<div class="img-text-row right-image">
                <div class="img-container">
                    <img src="https://fernandonogueiracosta.wordpress.com/wp-content/uploads/2018/10/reflexividade.jpg" alt="" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>7. Anthony Giddens e a reflexividade</h3>
                    <p>O sociólogo britânico Anthony Giddens fez uma releitura das teorias clássicas, propondo que os agentes são influenciados pelas estruturas sociais e, ao mesmo tempo, as recriam por meio da <strong>reflexividade</strong> – o processo de interpretar as estruturas e agir sobre elas (por exemplo, cumprir leis e, ao mesmo tempo, adaptá-las à realidade). Na modernidade tardia, ocorre uma radicalização da reflexividade: as mudanças são mais rápidas, geram incertezas e riscos globais, como pandemias e atentados terroristas.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 8: Bourdieu -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Pierre_Bourdieu_%281%29.jpg/960px-Pierre_Bourdieu_%281%29.jpg" alt="" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>8. Pierre Bourdieu e o habitus</h3>
                    <p>Bourdieu rompe com a dicotomia indivíduo vs. sociedade. Ele introduz o conceito de <strong>habitus</strong>: um sistema de disposições incorporadas que orienta o pensar, sentir e agir – um "estilo de vida" condicionado pela posição social. O habitus evidencia a <strong>relação dialética</strong> (interação dinâmica, conflitiva e contraditória) entre indivíduo e sociedade. Bourdieu também identificou diferentes formas de capital: <strong>econômico</strong> (renda, salário), <strong>simbólico</strong> (prestígio, reconhecimento), <strong>cultural</strong> (acesso à educação formal) e <strong>social</strong> (redes de relações). Um exemplo concreto são as diferenças nos hábitos alimentares, que funcionam como marcadores de distinção social.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 9: Saffioti -----
            `<div class="img-text-row right-image">
                <div class="img-container">
                    <img src="https://memoriafeminista.com.br/wp-content/uploads/2023/09/SAFFIOTI-Heleieth-Foto-3.jpg" alt="" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>9. Heleieth Saffioti – mulher na sociedade de classes</h3>
                    <p>A socióloga brasileira Heleieth Saffioti analisou as desigualdades e a violência de gênero, evidenciando a importância de considerar conjuntamente <strong>gênero, raça/etnia e classe social</strong> (interseccionalidade). A vida social está inserida em uma trama complexa de relações de poder. Saffioti, assim como Lélia Gonzalez, mostrou que as mulheres negras trabalhadoras ocupam a base da pirâmide social, são marcadas e silenciadas, mas são capazes de mover estruturas por meio da contestação das diferentes formas de hierarquização.</p>
                </div>
            </div>`,
            
            // ----- TÓPICO 10: Mills -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://3.bp.blogspot.com/-U1xQ95bzvBg/UDzqY-feCSI/AAAAAAAABj0/jMKmKivCoFk/s1600/mills.jpg" alt="" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>10. Charles Wright Mills – imaginação sociológica</h3>
                    <p>Charles Wright Mills desenvolveu o conceito de <strong>imaginação sociológica</strong>: a capacidade de compreender que questões aparentemente individuais são, na verdade, problemas coletivos. Nossas experiências pessoais não estão isoladas – fazem parte de experiências coletivas. Um exemplo emblemático é o assassinato de George Floyd (2020) e o movimento Black Lives Matter. O que parecia um ato policial isolado revelou‑se como expressão do racismo estrutural, gerando protestos em todo o mundo. A imaginação sociológica nos ajuda a conectar a biografia à história, transformando "dores pessoais" em "questões públicas".</p>
                </div>
            </div>`,
            
            // PÁGINA FINAL - CONGRATULAÇÕES
            `<div class="congrats-page">
                <h2>🎉 Parabéns!</h2>
                <p>Você concluiu o estudo sobre a relação entre indivíduo e sociedade.</p>
                <p>As perspectivas de Durkheim, Weber, Marx, Giddens, Bourdieu, Saffioti e Mills mostram que a sociologia oferece múltiplas lentes para compreender o mundo social.</p>
                <p>Isso é tudo por hoje!</p>
            </div>`
        ];

        const totalPages = pageContents.length;
        let currentPage = 0;
        let fontSizeIndex = 4;
        const fontSizes = [12, 14, 16, 18, 20, 24, 28, 32, 38, 42];

        const pageContentDiv = document.getElementById('pageContent');
        const pageXofY = document.getElementById('pageXofY');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const speakBtn = document.getElementById('speakBtn');
        const rateSelect = document.getElementById('rateSelect');

        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeaking = false;

        function getFemaleVoice() {
            const voices = synth.getVoices();
            const ptVoices = voices.filter(v => v.lang === 'pt-BR');
            const female = ptVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mulher') || v.name.includes('Samantha') || v.name.includes('Maria'));
            return female || ptVoices[0] || voices[0];
        }

        function updateUI() {
            pageContentDiv.innerHTML = pageContents[currentPage];
            const num = currentPage + 1;
            pageXofY.textContent = `Página ${num} de ${totalPages}`;
            const pct = (num / totalPages) * 100;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            prevBtn.disabled = (currentPage === 0);
            nextBtn.disabled = (currentPage === totalPages - 1);
            stopReading();
            if (pageContentDiv.scrollTop) pageContentDiv.scrollTop = 0;
        }

        function applyFontSize() {
            const size = fontSizes[fontSizeIndex] + 'px';
            pageContentDiv.style.fontSize = size;
            fontMinus.disabled = (fontSizeIndex === 0);
            fontPlus.disabled = (fontSizeIndex === fontSizes.length-1);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 0 && newPage < totalPages) {
                currentPage = newPage;
                updateUI();
            }
        }

        function startReading() {
            if (!synth) { alert('Seu navegador não suporta síntese de voz.'); return; }
            if (isSpeaking) { stopReading(); return; }
            const text = pageContentDiv.innerText;
            if (!text.trim()) return;
            currentUtterance = new SpeechSynthesisUtterance(text);
            const voice = getFemaleVoice();
            if (voice) currentUtterance.voice = voice;
            currentUtterance.rate = parseFloat(rateSelect.value);
            currentUtterance.onend = function() {
                isSpeaking = false;
                currentUtterance = null;
                speakBtn.textContent = '🔊';
            };
            synth.speak(currentUtterance);
            isSpeaking = true;
            speakBtn.textContent = '⏹️';
        }

        function stopReading() {
            if (synth && synth.speaking) synth.cancel();
            if (currentUtterance) {
                currentUtterance.onend = null;
                currentUtterance = null;
            }
            isSpeaking = false;
            speakBtn.textContent = '🔊';
        }

        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
        });
        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));
        speakBtn.addEventListener('click', startReading);
        rateSelect.addEventListener('change', () => {
            if (isSpeaking && currentUtterance) currentUtterance.rate = parseFloat(rateSelect.value);
        });

        applyFontSize();
        updateUI();
        if (synth) synth.getVoices();
    })();
</script>
</body>
</html>
