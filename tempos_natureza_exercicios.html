            `<div class="img-text-row">

            // Página 12 - Gabarito Questão 5
            `<div class="img-text-row">

                        <div class="alternatives">

            // Página 13 - Gabarito Questão 6
            `<div class="question-box">
                <p><strong>Questão 6</strong> — Sobre o ciclo hidrológico e a distribuição de água no planeta, é correto afirmar:</p>
                <div class="alternatives">
                    <p>a) Cerca de 80% das águas residuais industriais e municipais são tratadas antes de serem devolvidas ao meio ambiente.</p>
                    <p>b) O estresse hídrico mede a relação entre o total de água consumida e o abastecimento renovável disponível.</p>
                    <p>c) A distribuição de água doce no planeta é equilibrada, com todas as regiões tendo acesso semelhante aos recursos hídricos.</p>
                    <p>d) O Brasil não enfrenta problemas de escassez hídrica em nenhuma região de seu território.</p>
                </div>
                <div class="correct-answer">
                    <strong>✅ Gabarito: Alternativa B</strong>
                </div>
                <div class="justificativa">
                    <strong>Justificativa:</strong> O estresse hídrico é justamente a medida da pressão sobre os recursos hídricos, calculando a relação entre o total de água retirada e o abastecimento renovável disponível. A alternativa (a) está incorreta porque 80% das águas residuais são despejadas sem tratamento. O Semiárido brasileiro enfrenta escassez, invalidando (d).
                </div>
            </div>`,

            // Página 14 - Gabarito Questão 7
            `<div class="question-box">
                <p><strong>Questão 7</strong> — Considere as afirmações sobre os biomas terrestres: I. As florestas tropicais e equatoriais são formações arbóreas com vegetação latifoliada e perene. / II. A tundra é uma formação arbustiva encontrada nas proximidades do Círculo Polar Ártico. / III. As savanas são formações complexas que combinam vegetação rasteira com árvores e arbustos esparsos. / IV. A taiga é uma formação arbórea caracterizada pelo predomínio de árvores caducifólias. <strong>Estão corretas apenas as afirmações:</strong></p>
                <div class="alternatives">
                    <p>a) I e II.</p>
                    <p>b) I e III.</p>
                    <p>c) II e IV.</p>
                    <p>d) III e IV.</p>
                </div>
                <div class="correct-answer">
                    <strong>✅ Gabarito: Alternativa B</strong>
                </div>
                <div class="justificativa">
                    <strong>Justificativa:</strong> As afirmações I e III estão corretas. A afirmação II é incorreta porque a tundra é uma formação herbácea, não arbustiva. A afirmação IV é incorreta porque a taiga (floresta boreal) é composta por coníferas (acidulofiladas), e não por árvores caducifólias (que perdem as folhas).
                </div>
            </div>`,

            // Página 15 - Gabarito Questão 8
            `<div class="img-text-row">
                <div class="text-container">
                    <div class="question-box">
                        <p><strong>Questão 8</strong> — Os domínios morfoclimáticos brasileiros foram propostos pelo geógrafo Aziz Ab'Sáber. Assinale a alternativa que apresenta corretamente a correspondência entre o domínio e sua característica predominante:</p>
                        <div class="alternatives">

                            <p>c) Domínio dos Mares de Morros – planícies com vegetação herbácea.</p>
                            <p>d) Domínio das Pradarias – terras baixas com clima equatorial.</p>

                        <div class="correct-answer">

                        <div class="justificativa">
                            <strong>Justificativa:</strong> O Domínio do Cerrado é caracterizado por extensos planaltos e chapadas sedimentares, com vegetação de savana. As demais alternativas invertem características: Amazônico tem clima equatorial; Mares de Morros tem planaltos e serras com Mata Atlântica; Pradarias tem clima subtropical com vegetação herbácea.

                <div class="img-container">

                    <div class="img-caption">Domínios Morfoclimáticos</div>
                </div>
            </div>`,

            // Página 16 - Gabarito Questão 9
            `<div class="img-text-row">
                <div class="text-container">
                    <div class="question-box">
                        <p><strong>Questão 9</strong> — Sobre o Domínio da Caatinga, é correto afirmar:</p>
                        <div class="alternatives">

                        <div class="justificativa">
                            <strong>Justificativa:</strong> O Domínio da Caatinga apresenta relevo com planaltos (bacias do Parnaíba e da Borborema) e depressões (Sertaneja e do São Francisco), com predomínio de clima semiárido e solos pedregosos, pobres em matéria orgânica. A alternativa (a) descreve o Domínio Amazônico; (b) descreve o Domínio das Pradarias; (d) descreve o Domínio dos Mares de Morros.

                    <img src="https://i.imgur.com/onnNCXq.png" alt="Caatinga">

            </div>`,

            // Página 17 - Gabarito Questão 10
            `<div class="img-text-row">
                <div class="text-container">
                    <div class="question-box">
                        <p><strong>Questão 10</strong> — Analise as afirmativas sobre os desafios hídricos e ambientais: I. O rompimento de barragens em Mariana (2015) e Brumadinho (2019) contaminou importantes bacias hidrográficas brasileiras. / II. A dessalinização da água do mar é uma tecnologia que não apresenta nenhum impacto ambiental. / III. Cerca de 46% da população mundial não tinha acesso a saneamento adequado em 2023. <strong>Está(ão) correta(s):</strong></p>
                        <div class="alternatives">
                            <p>a) Apenas I.</p>
                            <p>b) Apenas II.</p>
                            <p>c) Apenas I e III.</p>
                            <p>d) I, II e III.</p>
                        </div>
                        <div class="correct-answer">
                            <strong>✅ Gabarito: Alternativa C</strong>
                        </div>
                        <div class="justificativa">
                            <strong>Justificativa:</strong> As afirmativas I e III estão corretas. A afirmativa II é incorreta porque a dessalinização apresenta impactos ambientais, como o alto custo energético e o descarte de salmoura concentrada, que pode afetar ecossistemas marinhos.
                        </div>
                    </div>
                </div>
                <div class="img-container">
                    <img src="https://www.bbc.com/staticarchive/2d6cffa6531c5c95531163d6377eed08ee187e7d.gif" alt="Desastre ambiental">
                    <div class="img-caption">Impactos ambientais</div>
                </div>
            </div>`,

            // Página 18 - Congratulações
            `<div class="congrats-page">
                <h2>🎉 Parabéns!</h2>
                <p style="margin-top: 20px;">Você concluiu o exercício sobre os Tempos da Natureza e a Ação Humana.</p>
                <p style="margin-top: 10px; font-size: 1.1rem;">Revise o conteúdo e bons estudos!</p>
                <div class="congrats-image">
                    <img src="https://media.tenor.com/1Gq9HnEJ5wMAAAAM/shih-tzu-shihtzu.gif" alt="Parabéns">
                </div>
                <p style="margin-top: 20px;">Professora Angela Siqueira</p>
            </div>`
        ];

        const totalPages = pageContents.length;
        let currentPage = 0;
        let fontSizeIndex = 4;
        const fontSizes = [12, 14, 16, 18, 20, 24, 28, 32, 38, 42];

        // Elementos DOM
        const readerScr = document.getElementById('readerScreen');
        const pageContent = document.getElementById('pageContent');
        const pageXofY = document.getElementById('pageXofY');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const speakBtn = document.getElementById('speakBtn');
        const rateSelect = document.getElementById('rateSelect');

        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeaking = false;

        function getFemaleVoice() {
            const voices = synth.getVoices();
            const ptVoices = voices.filter(v => v.lang === 'pt-BR');
            const female = ptVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mulher') || v.name.includes('Samantha') || v.name.includes('Maria'));
            return female || ptVoices[0] || voices[0];
        }

        function updateUI() {
            pageContent.innerHTML = pageContents[currentPage];
            const num = currentPage + 1;
            pageXofY.textContent = `Página ${num} de ${totalPages}`;
            const pct = (num / totalPages) * 100;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            prevBtn.disabled = (currentPage === 0);
            nextBtn.disabled = (currentPage === totalPages - 1);
            stopReading();
            if (pageContent.scrollTop) pageContent.scrollTop = 0;
        }

        function applyFontSize() {
            const size = fontSizes[fontSizeIndex] + 'px';
            pageContent.style.fontSize = size;
            fontMinus.disabled = (fontSizeIndex === 0);
            fontPlus.disabled = (fontSizeIndex === fontSizes.length-1);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 0 && newPage < totalPages) {
                currentPage = newPage;
                updateUI();
            }
        }

        function startReading() {
            if (!synth) {
                alert('Seu navegador não suporta síntese de voz.');
                return;
            }
            if (isSpeaking) {
                stopReading();
                return;
            }
            const text = pageContent.innerText;
            if (!text.trim()) return;
            currentUtterance = new SpeechSynthesisUtterance(text);
            const voice = getFemaleVoice();
            if (voice) currentUtterance.voice = voice;
            currentUtterance.rate = parseFloat(rateSelect.value);
            currentUtterance.onend = function() {
                isSpeaking = false;
                currentUtterance = null;
                speakBtn.textContent = '🔊';
            };
            synth.speak(currentUtterance);
            isSpeaking = true;
            speakBtn.textContent = '⏹️';
        }

        function stopReading() {
            if (synth && synth.speaking) synth.cancel();
            if (currentUtterance) {
                currentUtterance.onend = null;
                currentUtterance = null;
            }
            isSpeaking = false;
            speakBtn.textContent = '🔊';
        }

        // Event listeners
        fontMinus.addEventListener('click', () => {
            if (fontSizeIndex > 0) fontSizeIndex--;
            applyFontSize();
        });
        fontPlus.addEventListener('click', () => {
            if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++;
            applyFontSize();
        });
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
        });
        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));
        speakBtn.addEventListener('click', startReading);
        rateSelect.addEventListener('change', () => {
            if (isSpeaking && currentUtterance) {
                currentUtterance.rate = parseFloat(rateSelect.value);
            }
        });

        applyFontSize();
        updateUI();
        if (synth) synth.getVoices();
    })();
</script>
